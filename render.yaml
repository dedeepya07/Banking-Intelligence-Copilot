services:
  # Database
  - type: psqldb
    name: banking-intelligence-db
    plan: free
    region: singapore # Adjust as needed (closer to India is good)

  # Backend (FastAPI)
  - type: web
    name: banking-intelligence-api
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend.main:app"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: banking-intelligence-db
          property: connectionString
      - key: OPENAI_API_KEY
        value: "add-your-key-in-dashboard"
      # Add other env vars here, but keep keys out of source control
      - key: PYTHONPATH
        value: "./"

  # Frontend (Vite/React)
  - type: web
    name: banking-intelligence-ui
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: banking-intelligence-api
          type: web
          property: host
        # The frontend uses this to connect dynamically
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"
